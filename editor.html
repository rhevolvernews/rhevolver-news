<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Editor local | Rhevolver.news</title><link rel="stylesheet" href="assets/styles.css"></head><body><main class="editor container"><a class="brand" href="index.html"><span class="mark">R</span><span>Rhevolver<em>.news</em></span></a><h1>Generador de noticia</h1><p>Este formulario crea un bloque JSON. Por seguridad, GitHub Pages no puede publicar directamente sin una cuenta o servicio adicional. Copia el resultado dentro de <code>data/noticias.json</code> y súbelo a GitHub.</p><form id="editorForm"><label>Título<input name="titulo" required></label><label>Categoría<select name="categoria"><option>Nacional</option><option>Internacional</option><option>Opinión</option><option>IA</option><option>TV Show</option><option>Humor</option></select></label><label>Resumen<textarea name="resumen" required></textarea></label><label>Contenido<textarea name="contenido" required></textarea></label><label>Ruta de imagen<input name="imagen" value="assets/img/news-1.webp"></label><label>Autor<input name="autor" value="Rhevolver Media"></label><button class="primary-button">Generar JSON</button></form><textarea id="jsonOutput" class="json-output" readonly></textarea><button id="copyJson" class="secondary-button">Copiar resultado</button></main><script src="assets/editor.js"></script></body></html>
