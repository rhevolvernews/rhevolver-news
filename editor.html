<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Editor local | Rhevolver.news</title><link rel="stylesheet" href="assets/styles.css?v=11"></head>
<body><header class="site-header"><div class="brand-row shell"><a class="brand" href="index.html"><span class="brand-mark">R</span><span>Rhevolver<em>.news</em></span></a><a class="back-link" href="index.html">← Inicio</a></div></header>
<main class="editor shell"><span class="kicker">HERRAMIENTA LOCAL</span><h1>Generador de noticia</h1><p>Llena los campos y copia el bloque generado dentro de <code>data/noticias.json</code>. Este editor no publica por sí solo porque GitHub Pages es estático.</p>
<form id="editorForm">
<label>Título<input name="titulo" required></label><label>Resumen<textarea name="resumen" required></textarea></label><label>Contenido<textarea name="contenido" required placeholder="Separa los párrafos con una línea en blanco"></textarea></label><label>Categoría<select name="categoria"><option>Local</option><option>Nacional</option><option>Internacional</option><option>Opinión</option><option>IA</option><option>TV Show</option><option>Humor</option></select></label><label>Autor<input name="autor" value="Redacción"></label><label>Imagen<select name="imagen"><option value="assets/img/local.svg">Local</option><option value="assets/img/nacional.svg">Nacional</option><option value="assets/img/internacional.svg">Internacional</option><option value="assets/img/opinion.svg">Opinión</option><option value="assets/img/ia.svg">IA</option><option value="assets/img/tvshow.svg">TV Show</option><option value="assets/img/humor.svg">Humor</option></select></label><button class="primary-button" type="submit">Generar bloque JSON</button></form>
<textarea id="editorOutput" class="editor-output" readonly></textarea><button id="copyOutput" class="secondary-button" type="button">Copiar resultado</button></main><script src="assets/editor.js"></script></body></html>
